name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Format / Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Format ─────────────────────────────────────────────────────────────
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted (run 'go fmt ./...'):"
            echo "$unformatted"
            exit 1
          fi

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build
        run: go build -o gocker .

      # ── Unit tests ──────────────────────────────────────────────────────────
      - name: Unit tests
        run: go test ./internal/... -v -count=1

      # ── Integration tests ───────────────────────────────────────────────────
      # Integration tests require the compiled binary and run Linux-only code.
      - name: Integration tests
        run: go test ./tests/integration/... -v -count=1
